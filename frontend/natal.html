<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Natal | Calumira</title>
  <link rel="stylesheet" href="./css/style.css">

  <style>
    .natal-page {
      min-height: calc(100vh - 88px);
      padding: 90px 6vw 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: #000;
    }

    .natal-symbol {
      font-size: 2.6rem;
      color: rgba(216, 177, 111, .65);
      margin-bottom: 22px;
      letter-spacing: .3em;
    }

    .natal-page h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3.8rem, 7vw, 6rem);
      font-weight: 500;
      line-height: 1;
      color: #f5f1eb;
      margin-bottom: 2rem;
    }

    .natal-intro {
      max-width: 780px;
      margin: 0 auto 60px;
      color: #d8d0c4;
      font-size: 1.15rem;
      line-height: 1.9;
    }

    .natal-box {
      width: min(900px, 100%);
      padding: 55px;
      background: rgba(8, 8, 8, .92);
      border: 1px solid rgba(216, 177, 111, .25);
      border-radius: 32px;
      text-align: left;
      box-shadow:
        0 0 40px rgba(0, 0, 0, .45),
        inset 0 0 30px rgba(216, 177, 111, .04);
    }

    .natal-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .natal-field label {
      display: block;
      margin-bottom: 12px;
      color: #e8c98e;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: .75rem;
    }

    .natal-field input {
      width: 100%;
      padding: 22px 24px;
      background: #050505;
      border: 1px solid rgba(216, 177, 111, .22);
      border-radius: 18px;
      color: #f5f1eb;
      font-family: "Inter", sans-serif;
      font-size: 1rem;
    }

    .natal-field input:focus {
      outline: none;
      border-color: rgba(216, 177, 111, .65);
      box-shadow: 0 0 30px rgba(216, 177, 111, .08);
    }

    .natal-actions {
      margin-top: 36px;
      display: flex;
      justify-content: center;
    }

    .natal-actions .btn {
      min-width: 320px;
      min-height: 64px;
    }

    .natal-result {
      width: min(1120px, 100%);
      margin: 4rem auto 0;
    }

    .natal-card {
      background: rgba(8, 8, 8, .92);
      border: 1px solid rgba(216, 177, 111, .25);
      border-radius: 32px;
      padding: 50px;
      text-align: center;
      box-shadow:
        0 0 40px rgba(0, 0, 0, .45),
        inset 0 0 30px rgba(216, 177, 111, .03);
    }

    .natal-card span {
      display: block;
      color: #e8c98e;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: .75rem;
      margin-bottom: 1rem;
    }

    .natal-card h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: 3.8rem;
      font-weight: 400;
      margin-bottom: 1rem;
      color: #f5f1eb;
    }

    .natal-card p {
      color: #d8d0c4;
      font-size: 1.05rem;
      line-height: 1.9;
      max-width: 700px;
      margin: 0 auto 1.4rem;
    }

    .natal-reading-expanded {
      max-width: 1100px;
      margin: 0 auto;
      padding: 90px 80px;
      background: #0a0a0a;
      border: 1px solid rgba(216, 177, 111, .25);
      border-radius: 32px;
      text-align: center;
    }

    .natal-reading-expanded > span {
      display: block;
      color: #d8b16f;
      text-transform: uppercase;
      letter-spacing: .25em;
      font-size: .85rem;
      margin-bottom: 40px;
    }

    .natal-reading-expanded h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3rem, 5vw, 5rem);
      font-weight: 500;
      color: #f5f1eb;
      margin-bottom: 35px;
    }

    .natal-phrase {
      font-size: 1.4rem;
      color: #d8d0c4;
      margin-bottom: 60px;
      font-style: italic;
    }

    .natal-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 24px;
      margin-bottom: 70px;
    }

    .natal-meta div {
      padding: 24px;
      background: #050505;
      border: 1px solid rgba(216, 177, 111, .18);
      border-radius: 22px;
      text-align: center;
    }

    .natal-meta small {
      display: block;
      color: #d8b16f;
      text-transform: uppercase;
      letter-spacing: .15em;
      font-size: .75rem;
      margin-bottom: 14px;
    }

    .natal-meta strong {
      display: block;
      color: #f5f1eb;
      font-size: 1.15rem;
      font-weight: 500;
    }

    .natal-reading-expanded section {
      margin-bottom: 55px;
    }

    .natal-reading-expanded h3 {
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      font-weight: 500;
      color: #f5f1eb;
      margin-bottom: 18px;
    }

    .natal-reading-expanded section p {
      max-width: 760px;
      margin: 0 auto;
      color: #d8d0c4;
      line-height: 1.9;
      font-size: 1.1rem;
    }

    .natal-disclaimer {
      margin-top: 70px;
      padding-top: 40px;
      border-top: 1px solid rgba(216, 177, 111, .2);
    }

    .natal-disclaimer p {
      max-width: 800px;
      margin: 0 auto;
      color: #9c9488;
      line-height: 1.8;
      font-size: .95rem;
    }

    @media (max-width: 768px) {
      .natal-page {
        padding: 70px 6vw 90px;
      }

      .natal-grid {
        grid-template-columns: 1fr;
      }

      .natal-box {
        padding: 32px;
      }

      .natal-actions .btn {
        width: 100%;
        min-width: unset;
      }

      .natal-reading-expanded {
        padding: 50px 28px;
      }

      .natal-meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand">☉ CALUMIRA</div>

  <nav class="nav">
    <a href="index.html#herramientas">Herramientas</a>
    <a href="index.html#lecturas">Lecturas</a>
    <a href="index.html#tienda">Tienda</a>
    <a href="index.html#blog">Blog</a>
    <a href="index.html#contacto">Contacto</a>
  </nav>

  <a href="lecturas.html" class="header-cta">Solicitar lectura</a>
</header>

<main>
  <section class="natal-page">

    <div class="natal-symbol">☉ ✦ ☾ ✦ ♀</div>

    <p class="section-kicker">Carta Natal</p>

    <h1>Mapa Inicial del Alma</h1>

    <p class="natal-intro">
      Ingresa tus datos de nacimiento para recibir una visión simbólica inicial
      de tu energía solar y los temas centrales de tu mapa.
    </p>

    <div class="natal-box">

      <div class="natal-grid">

        <div class="natal-field">
          <label for="natal-name">Nombre</label>
          <input type="text" id="natal-name" placeholder="Tu nombre">
        </div>

        <div class="natal-field">
          <label for="natal-date">Fecha de nacimiento</label>
          <input type="date" id="natal-date">
        </div>

        <div class="natal-field">
          <label for="natal-time">Hora de nacimiento</label>
          <input type="time" id="natal-time">
        </div>

        <div class="natal-field">
          <label for="natal-place">Ciudad / País</label>
          <input type="text" id="natal-place" placeholder="Ejemplo: Panamá, Panamá">
        </div>

      </div>

      <div class="natal-actions">
        <button class="btn primary" onclick="generateNatalReading()">
          Generar visión inicial
        </button>
      </div>

    </div>

    <div id="natal-result" class="natal-result"></div>

  </section>
</main>

<script src="./js/natal.js"></script>

</body>
</html>
